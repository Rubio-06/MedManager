services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      CONNECTION_STRING: ${CONNECTION_STRING}
      DB_INIT_MAX_RETRIES: ${DB_INIT_MAX_RETRIES:-10}
      DB_INIT_RETRY_DELAY_SECONDS: ${DB_INIT_RETRY_DELAY_SECONDS:-5}
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-true}
      CLEANUP_LEGACY_DEMO_USERS: ${CLEANUP_LEGACY_DEMO_USERS:-true}
